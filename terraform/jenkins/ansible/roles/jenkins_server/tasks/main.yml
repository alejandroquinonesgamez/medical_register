---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install required Debian packages
  ansible.builtin.apt:
    name:
      - gpg
      - fontconfig
      - openjdk-21-jre
    state: present
    update_cache: false

- name: Install Jenkins apt key
  ansible.builtin.get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: '0644'

- name: Install Jenkins repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins 

- name: Install Jenkins required Debian packages
  ansible.builtin.apt:
    name:
      - jenkins
    state: present
    update_cache: true

- name: Ensure Jenkins service is enabled and started
  ansible.builtin.service:
    name: jenkins
    state: started
    enabled: yes

- name: Increase size of tmpfs (in cloud image)
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: 'tmpfs /tmp tmpfs defaults,size=3G,mode=1777 0 0'
    regexp: '^tmpfs\s+/tmp\s+tmpfs\s+'
    state: present
    insertafter: EOF
    backup: yes